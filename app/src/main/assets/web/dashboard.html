<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Far_Auto | Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js"></script>
    <style>
        :root {
            /* Light Mode Defaults */
            --bg: #f8f9fa;
            --panel: #ffffff;
            --border: #e0e0e0;
            --accent: #7f52ff;
            --accent-dim: rgba(127, 82, 255, 0.1);
            --text: #1a202c;
            --text-dim: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --header-height: 70px;
            --terminal-bg: #1a202c;
            --terminal-text: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0e14;
                --panel: #151921;
                --border: #252a34;
                --accent: #bb86fc;
                --accent-dim: rgba(187, 134, 252, 0.1);
                --text: #e1e7ef;
                --text-dim: #94a3b8;
                --danger: #ff5252;
                --success: #00e676;
                --terminal-bg: #0f131a;
                --terminal-text: #a5b4fc;
            }
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { height: var(--header-height); background: rgba(21, 25, 33, 0.8); backdrop-filter: blur(10px); padding: 0 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 100; }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-group h1 { font-size: 1.25rem; font-weight: 700; margin: 0; background: linear-gradient(90deg, #7f52ff, #bb86fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
        .auth-bar { display: flex; align-items: center; gap: 12px; }
        .input-dark { background: #1e2530; border: 1px solid var(--border); color: #fff; padding: 8px 14px; border-radius: 8px; outline: none; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
        .input-dark:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
        .main-content { display: flex; flex-grow: 1; overflow: hidden; padding: 24px; gap: 24px; }
        @media (max-width: 900px) { .main-content { flex-direction: column; overflow-y: auto; } .left-panel { max-width: 100% !important; min-height: 400px; } }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .left-panel { flex: 0 0 380px; overflow: hidden; display: flex; flex-direction: column; }
        .right-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { margin: 0; font-size: 1rem; font-weight: 600; color: var(--text-dim); }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: rgba(255, 82, 82, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        #script-list { overflow-y: auto; flex-grow: 1; padding: 12px; }
        .script-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-radius: 12px; margin-bottom: 8px; border: 1px solid transparent; }
        .script-item:hover { background: #1e2530; border-color: var(--border); }
        .script-info { display: flex; flex-direction: column; gap: 2px; }
        .script-name { font-weight: 500; font-size: 0.95rem; }
        .script-actions { display: flex; gap: 4px; opacity: 0; }
        .script-item:hover .script-actions { opacity: 1; }
        .tabs { display: flex; gap: 8px; padding: 12px 20px; background: var(--bg); }
        .tab-btn { background: transparent; color: var(--text-dim); border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 8px; }
        .tab-btn.active { background: var(--panel); color: var(--accent); }
        #log-terminal {
            background: var(--terminal-bg);
            color: var(--terminal-text);
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            white-space: pre-wrap;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .terminal-controls { padding: 16px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        #editor-container { display: none; flex-direction: column; flex-grow: 1; overflow: hidden; }
        #ace-editor { flex-grow: 1; width: 100%; height: 100%; background: var(--terminal-bg); }
        .editor-footer { padding: 12px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-group">
            <h1>Far_Auto</h1>
            <div id="status-badge" class="status-pill">Disconnected</div>
        </div>
        <div class="auth-bar">
            <input type="password" id="token-input" class="input-dark" placeholder="Auth Token">
            <button class="btn btn-primary" onclick="saveToken()">Connect</button>
        </div>
    </div>
    <div class="main-content">
        <div class="panel left-panel">
            <div class="panel-header">
                <h3>Scripts</h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-ghost" style="padding: 6px;" title="Refresh" onclick="loadScripts()">↻</button>
                    <button class="btn btn-primary" style="padding: 6px 12px;" onclick="newScript()">+ New</button>
                </div>
            </div>
            <div id="script-list"></div>
            <div style="padding: 20px; text-align: center; border-top: 1px solid var(--border); margin-top: auto;">
                <span style="font-size: 0.7rem; color: var(--text-dim); opacity: 0.5;">Developed by Fareed</span>
            </div>
        </div>
        <div class="panel right-panel">
            <div class="tabs">
                <button id="tab-terminal" class="tab-btn active" onclick="switchTab('terminal')">Terminal</button>
                <button id="tab-editor" class="tab-btn" onclick="switchTab('editor')">Editor</button>
            </div>
            <div id="terminal-container" style="display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;">
                <div id="log-terminal">Enter token and connect to see logs...</div>
                <div class="terminal-controls">
                    <div style="display: flex; gap: 12px;">
                        <input type="text" id="term-input" class="input-dark" style="flex-grow: 1;" placeholder="Enter command response..." onkeypress="if(event.key === 'Enter') sendInput()">
                        <button class="btn btn-primary" onclick="sendInput()">Send</button>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <button class="btn btn-danger" onclick="stopCurrent()">Stop Execution</button>
                        <button class="btn btn-ghost" onclick="clearLogsUI()">Clear Console</button>
                    </div>
                </div>
            </div>
            <div id="editor-container">
                <div id="ace-editor"></div>
                <div class="editor-footer">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 0.8rem; color: var(--text-dim);">File:</span>
                        <input type="text" id="editor-filename" class="input-dark" style="width: 180px; padding: 4px 8px; font-size: 0.8rem;" placeholder="filename.py">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-ghost" onclick="saveScript()">Save</button>
                        <button class="btn btn-primary" onclick="saveAndRun()">Save & Run</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let currentToken = localStorage.getItem('auto_token') || '';
        document.getElementById('token-input').value = currentToken;
        let editor;

        window.addEventListener('DOMContentLoaded', () => {
            try {
                editor = ace.edit("ace-editor");
                const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                editor.setTheme(isDark ? "ace/theme/tomorrow_night_eighties" : "ace/theme/chrome");
                editor.session.setMode("ace/mode/python");
                editor.setOptions({ fontSize: "14px", showPrintMargin: false });
            } catch(e) { console.error("Ace init failed", e); }
            if(currentToken) loadScripts();
        });

        function saveToken() {
            currentToken = document.getElementById('token-input').value;
            localStorage.setItem('auto_token', currentToken);
            loadScripts();
        }

        function switchTab(tab) {
            document.getElementById('tab-terminal').className = tab === 'terminal' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-editor').className = tab === 'editor' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('terminal-container').style.display = tab === 'terminal' ? 'flex' : 'none';
            document.getElementById('editor-container').style.display = tab === 'editor' ? 'flex' : 'none';
            if (tab === 'editor' && editor) editor.resize();
        }

        async function api(path, method='GET', body=null) {
            if (!currentToken) return { ok: false };
            const url = path + (path.includes('?') ? '&' : '?') + 'token=' + currentToken;
            try {
                const options = { method };
                if(body) {
                    options.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
                    options.body = body;
                }
                const res = await fetch(url, options);
                if (res.status === 401) {
                    updateStatus(false, "Unauthorized");
                    return { ok: false };
                }
                return res;
            } catch (e) { return { ok: false }; }
        }

        async function loadScripts() {
            const res = await api('/scripts');
            if (res.ok) {
                const scripts = await res.json();
                const list = document.getElementById('script-list');
                list.innerHTML = scripts.map(s => {
                    const isSystem = s === 'ui_explorer.py';
                    return `
                        <div class="script-item">
                            <div class="script-info">
                                <span class="script-name">${s}</span>
                                <span style="font-size: 0.7rem; color: var(--text-dim);">Python Script</span>
                            </div>
                            <div class="script-actions">
                                <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 0.7rem;" onclick="openEditor('${s}')">Edit</button>
                                ${isSystem ? '' : `<button class="btn btn-ghost" style="padding: 4px 8px; font-size: 0.7rem;" onclick="renameScript('${s}')">Rename</button>`}
                                <button class="btn btn-primary" style="padding: 4px 8px; font-size: 0.7rem;" onclick="runScript('${s}')">Run</button>
                                <button class="btn btn-danger" style="padding: 4px 8px; font-size: 0.7rem; border: none;" onclick="${isSystem ? `resetScript('${s}')` : `deleteScript('${s}')`}">${isSystem ? 'Reset' : 'Del'}</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        async function newScript() {
            document.getElementById('editor-filename').value = 'new_script.py';
            if (editor) editor.setValue('# New Script\nimport automator\n\n', -1);
            switchTab('editor');
        }

        async function openEditor(name) {
            const res = await api('/script_content?name=' + encodeURIComponent(name));
            if (res.ok) {
                const content = await res.text();
                document.getElementById('editor-filename').value = name;
                if (editor) editor.setValue(content, -1);
                switchTab('editor');
            }
        }

        async function saveScript(quiet = false) {
            const name = document.getElementById('editor-filename').value.trim();
            if (!name) { alert('Filename required'); return false; }
            const fullName = name.endsWith('.py') ? name : name + '.py';
            const content = editor ? editor.getValue() : "";
            const res = await api('/save_script?name=' + encodeURIComponent(fullName), 'POST', 'postData=' + encodeURIComponent(content));
            if (res.ok) {
                loadScripts();
                if (!quiet) alert('Saved successfully');
                return true;
            } else { alert('Failed to save'); return false; }
        }

        async function saveAndRun() {
            if (await saveScript(true)) {
                runScript(document.getElementById('editor-filename').value.trim());
            }
        }

        async function runScript(name) {
            const res = await api('/run?name=' + encodeURIComponent(name), 'POST');
            if (res.ok) {
                switchTab('terminal');
                document.getElementById('log-terminal').innerText = 'Initializing...';
            }
        }

        async function stopCurrent() { await api('/stop', 'POST'); }

        async function deleteScript(name) {
            if (confirm('Delete ' + name + '?')) {
                const res = await api('/delete?name=' + encodeURIComponent(name), 'POST');
                if (res.ok) loadScripts();
            }
        }

        async function resetScript(name) {
            if (confirm('Reset ' + name + '?')) {
                const res = await api('/reset?name=' + encodeURIComponent(name), 'POST');
                if (res.ok) { alert('Restored'); loadScripts(); }
            }
        }

        async function renameScript(oldName) {
            const newName = prompt('New name:', oldName);
            if (newName && newName !== oldName) {
                const res = await api(`/rename?old_name=${encodeURIComponent(oldName)}&new_name=${encodeURIComponent(newName)}`, 'POST');
                if (res.ok) loadScripts();
            }
        }

        async function sendInput() {
            const el = document.getElementById('term-input');
            const data = el.value;
            const res = await api('/input?data=' + encodeURIComponent(data), 'POST');
            if (res.ok) {
                el.value = '';
                document.getElementById('log-terminal').innerText = '> ' + data + '\n(Sent...)';
            }
        }

        function updateStatus(accessibility, runningScript, disconnected = false) {
            const badge = document.getElementById('status-badge');
            if (disconnected) {
                badge.innerText = 'DISCONNECTED';
                badge.style.color = 'var(--danger)';
                badge.style.borderColor = 'var(--danger)';
            } else if (!accessibility) {
                badge.innerText = 'ACCESSIBILITY OFF';
                badge.style.color = 'var(--danger)';
                badge.style.borderColor = 'var(--danger)';
            } else if (runningScript) {
                badge.innerText = 'Running: ' + runningScript;
                badge.style.color = 'var(--success)';
                badge.style.borderColor = 'var(--success)';
            } else {
                badge.innerText = 'Connected';
                badge.style.color = 'var(--accent)';
                badge.style.borderColor = 'var(--accent)';
            }
        }

        setInterval(async () => {
            if (!currentToken) return;
            try {
                const statusRes = await api('/status');
                if (statusRes && statusRes.ok) {
                    const status = await statusRes.json();
                    updateStatus(status.accessibility_enabled, status.running ? status.current_script : null);
                    if (status.running) {
                        const logRes = await api('/logs');
                        if (logRes && logRes.ok) {
                            const logs = await logRes.text();
                            const term = document.getElementById('log-terminal');
                            if (term.innerText !== logs) {
                                const atBottom = term.scrollHeight - term.clientHeight <= term.scrollTop + 100;
                                term.innerText = logs;
                                if (atBottom) term.scrollTop = term.scrollHeight;
                            }
                        }
                    }
                } else if (statusRes && statusRes.status === 401) {
                    const badge = document.getElementById('status-badge');
                    badge.innerText = 'UNAUTHORIZED';
                    badge.style.color = 'var(--danger)';
                } else {
                    updateStatus(false, null, true);
                }
            } catch (e) {
                updateStatus(false, null, true);
            }
        }, 1000);

        function clearLogsUI() { document.getElementById('log-terminal').innerText = ''; }
    </script>
</body>
</html>
